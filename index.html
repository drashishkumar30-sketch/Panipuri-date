<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golgappa Date 💛</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fbc2eb, #fcd5ce);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.card {
  background: #f2f2f2;
  width: 90%;
  max-width: 380px;
  border-radius: 30px;
  padding: 30px 20px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.message {
  font-size: 22px;
  font-weight: 600;
  min-height: 90px;
  margin-top: 20px;
  line-height: 1.4;
}

img {
  width: 240px;
  border-radius: 20px;
  margin: 20px 0;
}

.buttons {
  margin-top: 20px;
}

button {
  padding: 14px 24px;
  margin: 10px;
  border-radius: 30px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

.primary {
  background: linear-gradient(135deg, #ff3d77, #ff6a88);
  color: white;
}

.secondary {
  background: #ddd;
  color: #333;
}

.typing::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="card">

<h1>For Yukti 💛</h1>

<div class="message typing" id="msg"></div>

<img id="image" src="plate.PNG">

<div class="buttons" id="buttons"></div>

</div>

<script>

let step = 0;

function typeText(text){
  const msg = document.getElementById("msg");
  msg.innerText = "";
  let i = 0;

  function typing(){
    if(i < text.length){
      msg.innerText += text.charAt(i);
      i++;
      setTimeout(typing, 25);
    }
  }
  typing();
}

function next(choice="") {
  const img = document.getElementById("image");
  const btns = document.getElementById("buttons");

  btns.innerHTML = "";
  step++;

  if(step === 1){
    typeText("Madam… you wanted golgappa 😌");
    img.src = "plate.PNG";
    btns.innerHTML = `<button class="primary" onclick="next()">Take it</button>`;
  }

  else if(step === 2){
    typeText("So I brought it for you… personally 😏");
    img.src = "full.PNG";
    btns.innerHTML = `<button class="primary" onclick="next()">Hmm okay</button>`;
  }

  else if(step === 3){
    typeText("Should I crack it… or you’ll do it? 😌");
    btns.innerHTML = `
      <button class="primary" onclick="next()">You do it</button>
      <button class="secondary" onclick="next()">I’ll do it</button>
    `;
  }

  else if(step === 4){
    typeText("Okay… gently cracking it for you 😏");
    img.src = "empty.PNG";
    btns.innerHTML = `<button class="primary" onclick="next()">Next</button>`;
  }

  else if(step === 5){
    typeText("Adding stuffing… don’t rush 😋");
    img.src = "stuffing.PNG";
    btns.innerHTML = `<button class="primary" onclick="next()">Next</button>`;
  }

  else if(step === 6){
    typeText("Tell me… what should I add? 😏");
    btns.innerHTML = `
      <button class="primary" onclick="next('khatta')">Khatta 💧</button>
      <button class="secondary" onclick="next('meetha')">Meetha 🍯</button>
      <button class="secondary" onclick="next('dahi')">Dahi 🥛</button>
    `;
  }

  else if(step === 7){
    if(choice === "khatta") img.src = "khatta.PNG";
    else if(choice === "meetha") img.src = "meetha.PNG";
    else img.src = "dahi.PNG";

    typeText("Perfect… just how you like it 😌");
    btns.innerHTML = `<button class="primary" onclick="next()">Next</button>`;
  }

  else if(step === 8){
    typeText("Now… open your mouth 😏");
    btns.innerHTML = `<button class="primary" onclick="next()">🙂</button>`;
  }

  else if(step === 9){
    typeText("Careful… it might burst 💛");
    img.src = "final.PNG";
    btns.innerHTML = `<button class="primary" onclick="next()">Yum</button>`;
  }

  else if(step === 10){
    typeText("One last… for you 😌");
    img.src = "final.PNG";
    btns.innerHTML = `<button class="primary" onclick="next()">Take it</button>`;
  }

  else if(step === 11){
    typeText("Total bill… 1 kiss per golgappa 😏💋");
    btns.innerHTML = `<button class="primary" onclick="alert('Payment received 😌❤️')">Pay</button>`;
  }
}

next();

</script>

</body>
</html>
