<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey Yukti 🤭💋</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: linear-gradient(180deg, #ffd6e0, #f8b4c6);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: #3e2723;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  text-align: center;
}

.message {
  font-size: 26px;
  font-weight: 600;
  line-height: 1.5;
  min-height: 120px;
  margin-bottom: 20px;
}

img {
  width: 260px;
  max-width: 90%;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(60px);
  transition: all 0.5s ease;
}

/* SHOW IMAGE */
.show {
  opacity: 1;
  transform: translateY(0);
}

/* fade replace */
.fade {
  opacity: 0;
  transform: scale(0.95);
}

.buttons {
  padding: 20px;
  text-align: center;
}

button {
  padding: 16px 26px;
  margin: 10px;
  border-radius: 40px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

.primary {
  background: linear-gradient(135deg, #ff3d77, #ff6a88);
  color: white;
}

.secondary {
  background: #eee;
}

.typing::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="header">Hey Yukti 💋🤭</div>

<div class="content">
  <div class="message typing" id="msg"></div>
  <img id="image" src="">
</div>

<div class="buttons" id="buttons"></div>

<script>

let step = 0;

function typeText(text){
  const msg = document.getElementById("msg");
  msg.innerText = "";
  let i = 0;

  function typing(){
    if(i < text.length){
      msg.innerText += text.charAt(i);
      i++;
      setTimeout(typing, 30);
    }
  }
  typing();
}

function showImage(src){
  const img = document.getElementById("image");
  img.classList.remove("show");

  setTimeout(()=>{
    img.src = src;
    img.classList.add("show");
  }, 200);
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate([100, 50, 100]);
  }
}

function next(choice=""){
  const btns = document.getElementById("buttons");
  btns.innerHTML = "";
  step++;

  if(step === 1){
    typeText("Yukti… 😌");
    btns.innerHTML = `<button class="primary" onclick="next()">Hmm?</button>`;
  }

  else if(step === 2){
    typeText("Craving something spicy today? 😏");
    btns.innerHTML = `<button class="primary" onclick="next()">Maybe…</button>`;
  }

  else if(step === 3){
    typeText("Good… because I didn’t just bring golgappas…");
    btns.innerHTML = `<button class="primary" onclick="next()">Then?</button>`;
  }

  // 🎬 PLATE ENTRY (SLIDE IN)
  else if(step === 4){
    typeText("I came to serve you myself.\n\nHere… your plate 😌");

    setTimeout(()=>{
      showImage("plate.PNG");  // slides in
    }, 600);

    btns.innerHTML = `<button class="primary" onclick="next()">Take it</button>`;
  }

  else if(step === 5){
    typeText("Look at this… perfect 😏");

    setTimeout(()=>{
      showImage("full.PNG");
    }, 500);

    btns.innerHTML = `<button class="primary" onclick="next()">Hmm okay</button>`;
  }

  else if(step === 6){
    typeText("Should I break it… or you trust me? 😌");
    btns.innerHTML = `
      <button class="primary" onclick="next()">You do it</button>
      <button class="secondary" onclick="next()">I trust you</button>
    `;
  }

  else if(step === 7){
    typeText("Careful… just enough 😏");

    setTimeout(()=>{
      showImage("empty.PNG");
    }, 500);

    btns.innerHTML = `<button class="primary" onclick="next()">Next</button>`;
  }

  else if(step === 8){
    typeText("Now stuffing it… slowly 😋");

    setTimeout(()=>{
      showImage("stuffing.PNG");
    }, 500);

    btns.innerHTML = `<button class="primary" onclick="next()">Next</button>`;
  }

  else if(step === 9){
    typeText("Tell me… what do you feel like? 😏");
    btns.innerHTML = `
      <button class="primary" onclick="next('khatta')">Spicy 🌶️</button>
      <button class="secondary" onclick="next('meetha')">Sweet 🍯</button>
      <button class="secondary" onclick="next('dahi')">Soft 🥛</button>
    `;
  }

  else if(step === 10){
    typeText("Hmm… I knew it 😌");

    setTimeout(()=>{
      if(choice === "khatta") showImage("khatta.PNG");
      else if(choice === "meetha") showImage("meetha.PNG");
      else showImage("dahi.PNG");
    }, 500);

    btns.innerHTML = `<button class="primary" onclick="next()">Next</button>`;
  }

  else if(step === 11){
    typeText("Now… come closer…");
    btns.innerHTML = `<button class="primary" onclick="next()">🙂</button>`;
  }

  else if(step === 12){
    typeText("A little more…");
    btns.innerHTML = `<button class="primary" onclick="next()">🙂</button>`;
  }

  else if(step === 13){
    typeText("Open your mouth 😏");
    vibrate(); // 📳 vibration
    btns.innerHTML = `<button class="primary" onclick="next()">🙂</button>`;
  }

  else if(step === 14){
    typeText("Careful… this one is dangerous 💛");

    setTimeout(()=>{
      showImage("final.PNG");
    }, 500);

    btns.innerHTML = `<button class="primary" onclick="next()">Yum</button>`;
  }

  else if(step === 15){
    typeText("See? Perfect… messy… but cute 😌");
    btns.innerHTML = `<button class="primary" onclick="next()">Hmm</button>`;
  }

  else if(step === 16){
    typeText("One last… just for you 😌");

    setTimeout(()=>{
      showImage("final.PNG");
    }, 500);

    btns.innerHTML = `<button class="primary" onclick="next()">Take it</button>`;
  }

  else if(step === 17){
    typeText("Now… payment 😏💋\n1 kiss per golgappa.");
    btns.innerHTML = `<button class="primary" onclick="alert('Payment received ❤️')">Pay</button>`;
  }

}

next();

</script>

</body>
</html>
