<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golgappa Date 💛</title>

<style>
body {
  background: linear-gradient(135deg, #ffe0b2, #fff3e0);
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  padding: 30px;
}

h1 {
  color: #5d4037;
}

img {
  width: 230px;
  border-radius: 12px;
  margin-top: 20px;
  transition: 0.4s ease;
}

button {
  margin: 10px;
  padding: 10px 18px;
  border: none;
  background: #ff7043;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #f4511e;
}

.message {
  margin-top: 20px;
  font-size: 18px;
  color: #4e342e;
  min-height: 60px;
}

.typing::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<h1>Virtual Golgappa Date 💛</h1>

<div class="message typing" id="msg"></div>

<img id="image" src="plate.PNG">

<div id="buttons"></div>

<script>

let step = 0;

function typeText(text){
  const msg = document.getElementById("msg");
  msg.innerText = "";
  let i = 0;

  function typing(){
    if(i < text.length){
      msg.innerText += text.charAt(i);
      i++;
      setTimeout(typing, 25);
    }
  }
  typing();
}

function next(choice="") {
  const img = document.getElementById("image");
  const btns = document.getElementById("buttons");

  btns.innerHTML = "";
  step++;

  // 1 - intro + plate
  if(step === 1){
    typeText("Madam you wanted to eat golgappa… so here I have got you 😌");
    img.src = "plate.PNG";
    btns.innerHTML = `<button onclick="next()">Take plate</button>`;
  }

  // 2 - full golgappa
  else if(step === 2){
    typeText("First… presenting your golgappa 😏");
    img.src = "full.PNG";
    btns.innerHTML = `<button onclick="next()">Hmm okay</button>`;
  }

  // 3 - crack ask
  else if(step === 3){
    typeText("Should I crack it for you… or you’ll do it yourself? 😌");
    btns.innerHTML = `
      <button onclick="next()">You do it</button>
      <button onclick="next()">I’ll do it</button>
    `;
  }

  // 4 - cracked shell
  else if(step === 4){
    typeText("Okay… gently cracking it for you 😏");
    img.src = "empty.PNG";
    btns.innerHTML = `<button onclick="next()">Next</button>`;
  }

  // 5 - stuffing
  else if(step === 5){
    typeText("Adding stuffing… don’t get impatient 😋");
    img.src = "stuffing.PNG";
    btns.innerHTML = `<button onclick="next()">Next</button>`;
  }

  // 6 - choice
  else if(step === 6){
    typeText("Now tell me… what should I add? 😏");
    btns.innerHTML = `
      <button onclick="next('khatta')">Khatta 💧</button>
      <button onclick="next('meetha')">Meetha 🍯</button>
      <button onclick="next('dahi')">Dahi 🥛</button>
    `;
  }

  // 7 - based on choice
  else if(step === 7){
    if(choice === "khatta") img.src = "khatta.PNG";
    else if(choice === "meetha") img.src = "meetha.PNG";
    else img.src = "dahi.PNG";

    typeText("Perfect… made exactly how you like it 😌");
    btns.innerHTML = `<button onclick="next()">Next</button>`;
  }

  // 8 - open mouth
  else if(step === 8){
    typeText("Now… open your mouth 😏");
    btns.innerHTML = `<button onclick="next()">🙂</button>`;
  }

  // 9 - feed
  else if(step === 9){
    typeText("Careful… it might burst in your mouth 💛");
    img.src = "final.PNG";
    btns.innerHTML = `<button onclick="next()">Yum</button>`;
  }

  // 10 - sukha puri
  else if(step === 10){
    typeText("Wait… last one — sukha puri 😌");
    img.src = "empty.PNG";
    btns.innerHTML = `<button onclick="next()">Take it</button>`;
  }

  // 11 - payment
  else if(step === 11){
    typeText("Total bill… 1 kiss per golgappa 😏💋");
    btns.innerHTML = `<button onclick="alert('Payment received 😌❤️')">Pay</button>`;
  }
}

next();

</script>

</body>
</html>
