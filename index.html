<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Golgappa Date 💛</title>
  <style>
    body {
      background: linear-gradient(135deg, #ffe0b2, #fff3e0);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #5d4037;
    }

    .plate {
      margin-top: 40px;
      position: relative;
      display: inline-block;
    }

    .golgappa {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, #d4a373, #8d5524);
      border-radius: 50%;
      position: relative;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .golgappa:hover {
      transform: scale(1.05);
    }

    .stuffing {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .water {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 40px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .show {
      opacity: 1;
    }

    .message {
      margin-top: 30px;
      font-size: 18px;
      color: #4e342e;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    .final {
      margin-top: 20px;
      font-size: 20px;
      color: #bf360c;
      opacity: 0;
      transition: opacity 0.5s;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #ff7043;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #f4511e;
    }
  </style>
</head>
<body>

  <h1>Our Virtual Golgappa Date 💛</h1>
  <p>Tap the golgappa and let me serve you...</p>

  <div class="plate">
    <div class="golgappa" onclick="serveGolgappa()">
      <div id="stuffing" class="stuffing">🥔</div>
      <div id="water" class="water">💧</div>
    </div>
  </div>

  <div class="message" id="msg">
    Step 1: Tap to add aloo stuffing 😋
  </div>

  <div class="final" id="finalMsg">
    If only distance wasn’t there… I’d be standing right next to you, feeding you this ❤️
  </div>

  <script>
    let step = 0;

    function serveGolgappa() {
      step++;

      if (step === 1) {
        document.getElementById("stuffing").classList.add("show");
        document.getElementById("msg").innerText = "Step 2: Now tap again for khatta pani 💧";
      }

      else if (step === 2) {
        document.getElementById("water").classList.add("show");
        document.getElementById("msg").innerText = "Step 3: Ready… tap to eat it 😏";
      }

      else if (step === 3) {
        document.getElementById("finalMsg").style.opacity = "1";
        document.getElementById("msg").innerText = "Done. But the real one will taste better… with me.";
      }
    }
  </script>

</body>
</html>
