<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golgappa Date 💛</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffe0b2, #fff3e0);
  font-family: 'Segoe UI', sans-serif;
}

.container {
  text-align: center;
  max-width: 350px;
  width: 90%;
}

h1 {
  color: #5d4037;
  font-size: 26px;
  margin-bottom: 10px;
}

.message {
  font-size: 20px;
  color: #4e342e;
  min-height: 70px;
  line-height: 1.5;
  margin-bottom: 15px;
}

img {
  width: 240px;
  border-radius: 14px;
  margin: 15px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

button {
  padding: 12px 20px;
  border: none;
  background: #ff7043;
  color: white;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #f4511e;
}

.typing::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

<h1>Virtual Golgappa Date 💛</h1>

<div class="message typing" id="msg"></div>

<img id="image" src="plate.PNG">

<div id="buttons"></div>

</div>

<script>

let step = 0;

function typeText(text){
  const msg = document.getElementById("msg");
  msg.innerText = "";
  let i = 0;

  function typing(){
    if(i < text.length){
      msg.innerText += text.charAt(i);
      i++;
      setTimeout(typing, 25);
    }
  }
  typing();
}

function next(choice="") {
  const img = document.getElementById("image");
  const btns = document.getElementById("buttons");

  btns.innerHTML = "";
  step++;

  if(step === 1){
    typeText("Madam… you wanted to eat golgappa… so here I have got you 😌");
    img.src = "plate.PNG";
    btns.innerHTML = `<button onclick="next()">Take it</button>`;
  }

  else if(step === 2){
    typeText("First… your golgappa 😏");
    img.src = "full.PNG";
    btns.innerHTML = `<button onclick="next()">Hmm okay</button>`;
  }

  else if(step === 3){
    typeText("Should I crack it for you… or you’ll do it yourself? 😌");
    btns.innerHTML = `
      <button onclick="next()">You do it</button>
      <button onclick="next()">You do it for me</button>
    `;
  }

  else if(step === 4){
    typeText("Okay… gently cracking it for you 😏");
    img.src = "empty.PNG";
    btns.innerHTML = `<button onclick="next()">Next</button>`;
  }

  else if(step === 5){
    typeText("Adding stuffing… don’t get impatient 😋");
    img.src = "stuffing.PNG";
    btns.innerHTML = `<button onclick="next()">Next</button>`;
  }

  else if(step === 6){
    typeText("Now tell me… what should I add? 😏");
    btns.innerHTML = `
      <button onclick="next('khatta')">Khatta 💧</button>
      <button onclick="next('meetha')">Meetha 🍯</button>
      <button onclick="next('dahi')">Dahi 🥛</button>
    `;
  }

  else if(step === 7){
    if(choice === "khatta") img.src = "khatta.PNG";
    else if(choice === "meetha") img.src = "meetha.PNG";
    else img.src = "dahi.PNG";

    typeText("Perfect… made exactly how you like it 😌");
    btns.innerHTML = `<button onclick="next()">Next</button>`;
  }

  else if(step === 8){
    typeText("Now… open your mouth 😏");
    btns.innerHTML = `<button onclick="next()">🙂</button>`;
  }

  else if(step === 9){
    typeText("Here… careful… it might burst in your mouth 💛");
    img.src = "final.PNG";   // ✅ FINAL ONLY
    btns.innerHTML = `<button onclick="next()">Yum</button>`;
  }

  else if(step === 10){
    typeText("One last thing… your sukha puri 😌");
    img.src = "final.PNG";   // ✅ STILL FINAL (no empty now)
    btns.innerHTML = `<button onclick="next()">Take it</button>`;
  }

  else if(step === 11){
    typeText("Total bill… 1 kiss per golgappa 😏💋");
    btns.innerHTML = `<button onclick="alert('Payment received 😌❤️')">Pay</button>`;
  }
}

next();

</script>

</body>
</html>
